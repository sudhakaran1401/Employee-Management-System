<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Employment Management System</title>

  <!-- Bootstrap CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="{% url 'login' %}">Employment Management System</a>

    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <ul class="navbar-nav ms-auto">

          {% if user.is_authenticated %}
          <li class="nav-item dropdown">

            <!-- Username Dropdown Toggle -->
            <a class="nav-link dropdown-toggle text-white"
              href="#"
              id="userDropdown"
              role="button"
              data-bs-toggle="dropdown"
              aria-expanded="false">

              {{ user.username }}

            </a>

            <!-- Dropdown Menu -->
            <ul class="dropdown-menu dropdown-menu-end bg-dark" aria-labelledby="userDropdown">

              <li>
                <a class="dropdown-item text-white" href="{% url 'post_login_redirect' %}">
                  Dashboard
                </a>
              </li>

              <li>
                <a class="dropdown-item text-white" href="{% url 'my_profile' %}">
                  Profile
                </a>
              </li>

              <li><hr class="dropdown-divider text-white" ></li>

              <li>
                <form method="post" action="{% url 'logout' %}" class="m-0">
                  {% csrf_token %}
                  <button type="submit" class="dropdown-item text-white">
                    Logout
                  </button>
                </form>
              </li>
            </ul>

          </li>
          {% else %}
          <li class="nav-item">
            <a class="nav-link" href="{% url 'login' %}">Login</a>
          </li>
          {% endif %}
          </ul>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-2 col-md-5" id="live-message-container"></div>

<!-- Main Content -->
<div class="container mt-4">
  {% block content %}{% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
<script>
document.addEventListener("DOMContentLoaded", function () {

    const messageType = "{{ message.type|default:'' }}";
    const messageText = "{{ message.text|default:'' }}";

    if (messageText) {
        showMessage(messageText, messageType);
    }

});


// 🔁 Download button handler
document.addEventListener("click", function (e) {

    const link = e.target.closest("a.download-btn");
    if (!link) return;

    e.preventDefault();

    const url = link.href;
    const message = link.dataset.message || "Download started";
    const type = link.dataset.type || "success";

    showMessage(message, type);

    setTimeout(() => {
        window.location.href = url;
    }, 300);

});


// 🔥 COMMON MESSAGE FUNCTION (BIG BLOCK)
function showMessage(text, type = "success") {

    const container = document.getElementById("live-message-container");

    const msg = document.createElement("div");

    msg.className = `alert alert-${getBootstrapType(type)} alert-dismissible fade show`;
    msg.role = "alert";

    msg.innerHTML = `
        ${text}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    `;

    container.appendChild(msg);

    // Auto remove
    setTimeout(() => {
        msg.classList.remove("show");
        msg.classList.add("fade");
        setTimeout(() => msg.remove(), 300);
    }, 3000);
}


// 🎨 Type mapping
function getBootstrapType(type) {
    if (type === "error") return "danger";
    if (type === "warning") return "warning";
    return "success";
}


// 🔤 Capitalize
function capitalize(text) {
    return text.charAt(0).toUpperCase() + text.slice(1);
}
</script>

<style>
.custom-alert {
    padding: 12px 20px;
    color: white;
    border-radius: 6px;
    font-size: 14px;
    min-width: 100px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: opacity 0.3s ease;
}
</style>
</html>
