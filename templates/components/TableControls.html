<!-- Reusable Table Controls -->
<div class="d-flex justify-content-between align-items-center mt-3 flex-wrap">

    <!-- LEFT: Rows per page -->
    <div class="d-flex align-items-center gap-2">
        <label class="mb-0">Rows per page:</label>
        <select id="{{ table_id }}_rowsPerPage" class="form-select form-select-sm" style="width:auto;">
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="25">25</option>
            <option value="50">50</option>
        </select>
    </div>

    <!-- CENTER: Page info -->
    <div>
        <small class="text-muted" id="{{ table_id }}_pageInfo"></small>
    </div>

    <!-- RIGHT: Controls -->
    <div class="d-flex align-items-center gap-2">
        <button id="{{ table_id }}_prev" class="btn btn-sm btn-outline-primary">Prev</button>
        <button id="{{ table_id }}_next" class="btn btn-sm btn-outline-primary">Next</button>
    </div>

</div>
